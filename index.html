<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Dashboard</title>
<script src="lib/data-source.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  nav { background: #16213e; padding: 0 24px; display: flex; align-items: center; border-bottom: 1px solid #0f3460; height: 48px; flex-shrink: 0; }
  nav .brand { font-size: 1.1rem; font-weight: 700; color: #4ecca3; margin-right: 32px; }
  nav .tabs { display: flex; gap: 4px; height: 100%; }
  nav .tab { padding: 0 16px; height: 100%; display: flex; align-items: center; cursor: pointer; color: #888; font-size: 0.85rem; font-weight: 500; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  nav .tab:hover { color: #ccc; }
  nav .tab.active { color: #4ecca3; border-bottom-color: #4ecca3; }
  .frame-container { flex: 1; position: relative; }
  .frame-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
  .frame-container iframe.active { display: block; }
</style>
</head>
<body>
<nav>
  <span class="brand">Dash</span>
  <div class="tabs" id="tabs"></div>
  <span id="version" style="margin-left:auto;font-size:0.7rem;color:#e0e0e0"></span>
  <span id="modeToggle" style="margin-left:8px"></span>
</nav>
<div class="frame-container" id="frames"></div>
<script>
const DASHBOARDS = [
  { id: 'daily',     label: 'Daily',     src: 'daily/index.html' },
  { id: 'sales',     label: 'Sales',     src: 'sales/index.html' },
  { id: 'targets',   label: 'Targets',   src: 'sales/budget.html' },
  { id: 'plant-map', label: 'Plant Map', src: 'plant-map/index.html' },
  { id: 'logistics', label: 'Logistics', src: 'logistics/index.html' },
  { id: 'staffing',  label: 'Staffing',  src: 'HR/index.html' },
  { id: 'cukes',     label: 'Cukes',     src: 'cukes/index.html' },
  { id: 'chat',      label: 'Chat',      src: 'chat/index.html' },
  { id: 'chem',      label: 'Chemistry', src: 'chem/index.html' },
  { id: 'fsafe',    label: 'Food Safety', src: 'fsafe/index.html' },
  { id: 'pack',     label: 'Pack Plan',  src: 'pack/index.html' },
];

const tabs = document.getElementById('tabs');
const framesEl = document.getElementById('frames');
const iframes = {};

// Chem has no Supabase tables yet, so pin it to sheets regardless of global mode.
const FORCE_SHEETS = { chem: true };

function srcWithMode(dash) {
  const mode = FORCE_SHEETS[dash.id] ? 'sheets' : DataSource.getMode();
  const sep = dash.src.includes('?') ? '&' : '?';
  return dash.src + sep + 'src=' + mode;
}

function navigate(id) {
  const dash = DASHBOARDS.find(d => d.id === id) || DASHBOARDS[0];
  location.hash = dash.id;
  // Lazy-create iframe on first visit
  if (!iframes[dash.id]) {
    const f = document.createElement('iframe');
    f.src = srcWithMode(dash);
    f.id = 'frame-' + dash.id;
    framesEl.appendChild(f);
    iframes[dash.id] = f;
  }
  // Show active, hide others
  Object.entries(iframes).forEach(([key, f]) => f.classList.toggle('active', key === dash.id));
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.id === dash.id)
  );
}

DASHBOARDS.forEach(d => {
  const el = document.createElement('div');
  el.className = 'tab';
  el.dataset.id = d.id;
  el.textContent = d.label;
  el.onclick = () => navigate(d.id);
  tabs.appendChild(el);
});

DataSource.renderModeToggle('modeToggle');
navigate(location.hash.slice(1) || DASHBOARDS[0].id);
window.addEventListener('hashchange', () => navigate(location.hash.slice(1)));

fetch('index.html',{method:'HEAD'}).then(r => {
  const d = new Date(r.headers.get('last-modified'));
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('version').textContent = `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}).catch(() => {});

</script>
</body>
</html>
