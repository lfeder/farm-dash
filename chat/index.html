<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm AI Chat</title>
<script src="../lib/data-source.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
#header { background: #16213e; padding: 8px 20px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#header h1 { font-size: 1.1rem; color: #4ecca3; }
#header .stats { font-size: 0.7rem; color: #888; display: flex; gap: 16px; align-items: center; }
#header .stats #versionStamp { font-size: 0.75rem; color: #e0e0e0; }

#chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; line-height: 1.5; }
.msg-user { align-self: flex-end; background: #0f3460; border-bottom-right-radius: 2px; }
.msg-ai { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; border-bottom-left-radius: 2px; }
.msg-error { align-self: flex-start; background: #2a1a1a; border: 1px solid #e74c3c; color: #e74c3c; }
.msg-status { align-self: center; color: #888; font-size: 0.75rem; }
#loading-status { display: flex; align-items: center; justify-content: center; flex: 1; font-size: 1.1rem; color: #4ecca3; flex-direction: column; gap: 8px; }
#loading-status .sub { font-size: 0.75rem; color: #888; }
.msg-code { font-size: 0.7rem; margin-top: 8px; padding: 8px; background: #1a1a2e; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; font-family: 'Consolas', 'Monaco', monospace; color: #aaa; }
.msg-code summary { color: #888; font-size: 0.65rem; cursor: pointer; }
.msg-cost { font-size: 0.6rem; color: #555; margin-top: 4px; }
.result-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.75rem; }
.result-table th { text-align: left; padding: 4px 8px; border-bottom: 2px solid #0f3460; color: #4ecca3; background: #16213e; position: sticky; top: 0; }
.result-table td { padding: 3px 8px; border-bottom: 1px solid #0f3460; }
.result-table th.num, .result-table td.num { text-align: right; }

#input-area { padding: 10px 16px; border-top: 1px solid #0f3460; display: flex; gap: 8px; flex-shrink: 0; }
#question { flex: 1; background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; font-family: inherit; outline: none; }
#question:focus { border-color: #4ecca3; }
#question::placeholder { color: #555; }
.btn-primary { padding: 6px 16px; font-size: 0.85rem; background: #4ecca3; color: #1a1a2e; border: 1px solid #4ecca3; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.15s; }
.btn-primary:hover { background: #3dbb94; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.examples { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 8px; }
.example-btn { padding: 4px 10px; font-size: 0.7rem; background: #0f3460; color: #aaa; border: 1px solid transparent; border-radius: 12px; cursor: pointer; transition: all 0.15s; }
.example-btn:hover { color: #e0e0e0; border-color: #4ecca3; }
</style>
</head>
<body>

<div id="header">
  <h1>Farm AI</h1>
  <div class="stats">
    <span id="stat-tables"></span>
    <span id="stat-cost"></span>
    <span id="versionStamp">04-18 09:25</span>
  </div>
</div>

<div id="chat-wrap">
  <div id="loading-status">Loading schema from Supabase…</div>
  <div id="messages" style="display:none"></div>
  <div class="examples" id="examples">
    <button class="example-btn" onclick="askExample(this)">What tables are available?</button>
    <button class="example-btn" onclick="askExample(this)">Total cases invoiced last week</button>
    <button class="example-btn" onclick="askExample(this)">Top 10 customers by 2026 sales</button>
    <button class="example-btn" onclick="askExample(this)">Cuke harvest pounds per greenhouse this month</button>
  </div>
  <div id="input-area">
    <input type="text" id="question" placeholder="Ask a question about your farm data…" />
    <button class="btn-primary" id="ask-btn" onclick="ask()">Ask</button>
  </div>
</div>

<script>
// ── Anthropic API key (obfuscated) ──────────────────────
const _k = ['c2stYW50LWFwaTAzLWFIYjAteVhXQ','21HMU9kNTVGTmZ6MnltNGFyS1hmTX','ZvMG9hY1otdThvbnFsM0VxVWJvLU8','2YzdRM0NOWEdoSEx4YXFBeW4ycUhP','SjU3d0xyZGdZNFlnLUx6UWJGUUFB'];
const API_KEY = atob(_k.join(''));

// ── State ───────────────────────────────────────────────
let SCHEMA = null;          // jsonb array of { table, kind, columns: [{name,type}] }
let totalCost = 0;
let queryCount = 0;
let schemaReady = false;
let pendingQuestion = null;

// ── Schema load (single Supabase RPC call) ──────────────
async function loadSchema() {
  try {
    const client = await DataSource.getClient();
    const { data, error } = await client.rpc('chat_schema');
    if (error) throw error;
    SCHEMA = data || [];
    schemaReady = true;
    document.getElementById('loading-status').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
    addMessage('status', `Loaded ${SCHEMA.length} tables (${DataSource.getMode()})`);
    updateStats();
    if (pendingQuestion) { const q = pendingQuestion; pendingQuestion = null; document.getElementById('question').value = q; ask(); }
  } catch (err) {
    document.getElementById('loading-status').textContent = 'Failed to load schema: ' + (err.message || err);
    console.error(err);
  }
}

function formatSchemaForPrompt() {
  let out = '';
  for (const t of SCHEMA) {
    out += `\n${t.kind === 'view' ? 'VIEW' : 'TABLE'} ${t.table}:\n`;
    for (const c of t.columns) out += `  ${c.name} ${c.type}\n`;
  }
  return out;
}

// ── Claude API ──────────────────────────────────────────
async function callClaude(question) {
  const schema = formatSchemaForPrompt();
  const prompt = `You are a read-only analytics assistant for a farm's Postgres database (Supabase). Write a single SELECT / WITH query that answers the user's question.

Schema (public schema only):
${schema}

Rules:
- Output ONLY the SQL query, nothing else. No markdown, no commentary, no trailing semicolon required.
- SELECT / WITH only. No INSERT/UPDATE/DELETE/DDL (they will be rejected).
- Do not reference hr_* / app_hr_* tables. They are restricted.
- Prefer views (grow_cuke_harvest_v, grow_lettuce_harvest_v, sales_invoice_v, fin_expense_v) when they exist.
- Limit results to at most 500 rows unless asked for more.
- Use PostgreSQL syntax. Date columns are real DATE/TIMESTAMP types.

Question: ${question}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2048,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }

  const json = await resp.json();
  const inputTokens = json.usage.input_tokens;
  const outputTokens = json.usage.output_tokens;
  const cost = (inputTokens * 3 / 1e6) + (outputTokens * 15 / 1e6);

  let sql = json.content[0].text.trim();
  sql = sql.replace(/^```(?:sql|postgres|postgresql)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
  sql = sql.replace(/;\s*$/, '');
  return { sql, inputTokens, outputTokens, cost };
}

// ── Execute via Supabase RPC ────────────────────────────
async function executeSql(sql) {
  const client = await DataSource.getClient();
  const { data, error } = await client.rpc('chat_query', { q: sql });
  if (error) throw new Error(error.message || JSON.stringify(error));
  return data || [];
}

// ── Result rendering ────────────────────────────────────
function formatResult(result) {
  if (result == null) return '<em>No result</em>';
  if (Array.isArray(result) && result.length === 0) return '<em>No rows</em>';
  if (Array.isArray(result) && typeof result[0] === 'object') return renderTable(result);
  return String(result);
}

function renderTable(rows) {
  const cols = Object.keys(rows[0]);
  const isNum = col => rows.some(r => typeof r[col] === 'number');
  let html = '<table class="result-table"><thead><tr>';
  for (const c of cols) html += `<th${isNum(c) ? ' class="num"' : ''}>${c}</th>`;
  html += '</tr></thead><tbody>';
  for (const row of rows.slice(0, 200)) {
    html += '<tr>';
    for (const c of cols) {
      const v = row[c];
      const display = typeof v === 'number'
        ? (Number.isInteger(v) ? v.toLocaleString() : v.toFixed(2))
        : (v == null ? '' : v);
      html += `<td${isNum(c) ? ' class="num"' : ''}>${display}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  if (rows.length > 200) html += `<div style="font-size:0.65rem;color:#888;margin-top:4px">Showing 200 of ${rows.length} rows</div>`;
  return html;
}

// ── Chat UI ─────────────────────────────────────────────
function addMessage(role, html, extra) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-' + role;
  div.innerHTML = html;
  if (extra) div.innerHTML += extra;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function askExample(btn) {
  if (document.getElementById('question').disabled) return;
  document.getElementById('question').value = btn.textContent;
  ask();
}

async function ask() {
  const input = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;
  if (!schemaReady) {
    pendingQuestion = question;
    input.value = '';
    addMessage('user', question);
    addMessage('status', 'Waiting for schema to load…');
    return;
  }

  const history = JSON.parse(localStorage.getItem('farm_chat_history') || '[]');
  if (history[history.length - 1] !== question) history.push(question);
  if (history.length > 100) history.shift();
  localStorage.setItem('farm_chat_history', JSON.stringify(history));
  historyIndex = history.length;

  input.value = '';
  addMessage('user', question);
  document.getElementById('examples').style.display = 'none';

  const thinking = document.createElement('div');
  thinking.className = 'msg msg-ai';
  thinking.textContent = 'Thinking…';
  thinking.style.color = '#888';
  document.getElementById('messages').appendChild(thinking);

  try {
    const { sql, inputTokens, outputTokens, cost } = await callClaude(question);
    totalCost += cost;
    queryCount++;

    let resultHtml;
    try {
      const rows = await executeSql(sql);
      resultHtml = formatResult(rows);
    } catch (execErr) {
      resultHtml = `<span style="color:#e74c3c">Query error: ${execErr.message}</span>`;
    }

    const codeBlock = `<details class="msg-code"><summary>sql</summary>${sql.replace(/</g, '&lt;')}</details>`;
    const costLine = `<div class="msg-cost">${inputTokens.toLocaleString()} in / ${outputTokens.toLocaleString()} out · $${cost.toFixed(4)}</div>`;

    thinking.remove();
    addMessage('ai', resultHtml, codeBlock + costLine);
    saveChatHistory();
    updateStats();
  } catch (err) {
    thinking.remove();
    addMessage('error', err.message);
  }
}

function updateStats() {
  document.getElementById('stat-tables').textContent = SCHEMA ? `${SCHEMA.length} tables` : '';
  document.getElementById('stat-cost').textContent = queryCount ? `$${totalCost.toFixed(4)}` : '';
}

// ── Prompt history + enter key ───────────────────────────
let historyIndex = -1;
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); return; }
  const history = JSON.parse(localStorage.getItem('farm_chat_history') || '[]');
  if (!history.length) return;
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex === -1 || historyIndex === history.length) historyIndex = history.length;
    if (historyIndex > 0) historyIndex--;
    document.getElementById('question').value = history[historyIndex];
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      document.getElementById('question').value = history[historyIndex];
    } else {
      historyIndex = history.length;
      document.getElementById('question').value = '';
    }
  }
});

// ── Chat history persistence (12h) ──────────────────────
function saveChatHistory() {
  const msgs = document.getElementById('messages');
  const entries = [];
  msgs.querySelectorAll('.msg').forEach(el => {
    const role = el.classList.contains('msg-user') ? 'user' : el.classList.contains('msg-ai') ? 'ai' : el.classList.contains('msg-error') ? 'error' : 'status';
    entries.push({ role, html: el.innerHTML });
  });
  localStorage.setItem('farm_chat_messages', JSON.stringify({ ts: Date.now(), entries }));
}

function restoreChatHistory() {
  const raw = localStorage.getItem('farm_chat_messages');
  if (!raw) return false;
  const { ts, entries } = JSON.parse(raw);
  if (Date.now() - ts > 12 * 60 * 60 * 1000) { localStorage.removeItem('farm_chat_messages'); return false; }
  if (!entries || !entries.length) return false;
  const msgs = document.getElementById('messages');
  entries.forEach(e => {
    const div = document.createElement('div');
    div.className = 'msg msg-' + e.role;
    div.innerHTML = e.html;
    msgs.appendChild(div);
  });
  document.getElementById('examples').style.display = 'none';
  return true;
}

restoreChatHistory();
loadSchema();
</script>
</body>
</html>
