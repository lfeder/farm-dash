<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lettuce Schedule</title>
<script src="../lib/data-source.js?v=20260622c"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0eb; color: #333; }
  #header { background: #4a8c5c; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  #header h1 { font-size: 1.5rem; color: #fff; font-weight: 700; }
  #content { max-width: 1240px; margin: 0 auto; padding: 18px 24px; }

  /* Summary banner */
  .summary { display: flex; gap: 8px; align-items: stretch; margin-bottom: 16px; flex-wrap: wrap; }
  .sum-box { padding: 10px 16px; border-radius: 4px; font-size: 1.1rem; font-weight: 600; }
  .sum-ok   { background: #d3f3dd; color: #2f7d4f; border: 1px solid #a8e0bb; }
  .sum-warn { background: #fdecc8; color: #9a6a00; border: 1px solid #f0d890; }
  .pond-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .chip { font-size: 0.78rem; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; background: #fff; white-space: nowrap; }
  .chip b { font-weight: 600; }
  .chip.full { border-color: #a8e0bb; background: #eefbf2; }
  .chip.gap  { border-color: #f0c0c0; background: #fdeeee; color: #b3402f; }
  .chip.over { border-color: #f0d890; background: #fdf6e3; color: #9a6a00; }

  /* Gantt */
  .section-title { font-size: 1.05rem; font-weight: 600; color: #333; margin: 18px 0 8px; }
  #gantt { background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow-x: auto; }
  .g-row { display: flex; align-items: stretch; border-bottom: 1px solid #eee; min-height: 26px; }
  .g-row:last-child { border-bottom: none; }
  .g-row.pondhdr { background: #f3efe9; font-weight: 600; }
  .g-label { flex: 0 0 96px; padding: 4px 8px; font-size: 0.78rem; color: #444; border-right: 1px solid #e6e0d8; position: sticky; left: 0; background: inherit; display: flex; align-items: center; justify-content: space-between; }
  .g-label .cap { color: #999; font-weight: 400; font-size: 0.7rem; }
  .g-track { position: relative; flex: 1 1 auto; }
  .g-axis { height: 22px; }
  .g-week { position: absolute; top: 0; bottom: 0; border-left: 1px solid #eee; font-size: 0.66rem; color: #aaa; padding-left: 3px; }
  .g-today { position: absolute; top: 0; bottom: 0; border-left: 2px solid #e07a5f; z-index: 3; }
  .g-block { position: absolute; border-radius: 2px; overflow: hidden; border: 2px solid rgba(0,0,0,0.7); }
  .g-block.planned { opacity: 0.6; border-style: dashed; }

  /* Issues + legend */
  .issue { border-bottom: 1px solid #eee; padding: 7px 4px; font-size: 0.85rem; }
  .issue:last-child { border-bottom: none; }
  .issue .pill { display: inline-block; min-width: 30px; font-weight: 600; color: #4a8c5c; }
  .issue.gap  .pill { color: #b3402f; }
  .issue.over .pill { color: #9a6a00; }
  .none { color: #888; font-size: 0.9rem; padding: 8px 4px; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; font-size: 0.76rem; color: #555; }
  .legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }
  #loading { padding: 40px; text-align: center; color: #4a8c5c; }
</style>
</head>
<body>

<div id="header">
  <h1>Lettuce Schedule</h1>
  <span style="font-size:0.7rem;color:#fff;" id="versionStamp">06-22</span>
</div>

<div id="content">
  <div id="loading">Loading schedule…</div>
  <div id="main" style="display:none;">
    <div class="summary">
      <div class="sum-box" id="sum-status"></div>
      <div class="pond-chips" id="pond-chips"></div>
    </div>

    <div class="section-title">Pond timeline — next 6 weeks</div>
    <div id="gantt"></div>
    <div class="legend" id="legend"></div>

    <div class="section-title" id="issues-title">Schedule issues</div>
    <div id="issues"></div>
  </div>
</div>

<script>
// ── Config ──
const CAP = { P1: 830, P2: 2200, P3: 2200, P4: 2200, P5: 2200, P6: 2200, P7: 2200 };
const VIS_WEEKS = 6;          // visual horizon
const CHECK_WEEKS = 8;        // fullness/balance check horizon (~2 months)
const TOL = 100;              // boards tolerance before flagging under/over (5 rows)
const DAY = 86400000;
const VARIETY_COLORS = ['#4a90d9','#4ecca3','#f0a030','#9b59b6','#e74c3c','#16a085','#e67e22','#2c7fb8','#8e44ad','#27ae60'];

let cycles = [];

function parseUsDate(v) {
  if (!v) return null;
  let m = String(v).match(/Date\((\d+),(\d+),(\d+)/);
  if (m) return new Date(Date.UTC(+m[1], +m[2], +m[3]));
  m = String(v).match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (!m) return null;
  let y = +m[3]; if (y < 100) y += 2000;
  return new Date(Date.UTC(y, +m[1] - 1, +m[2]));
}
function hstToday() {
  const h = new Date(new Date().getTime() - 10 * 3600000);
  return new Date(Date.UTC(h.getUTCFullYear(), h.getUTCMonth(), h.getUTCDate()));
}
function fmtMD(d) { return (d.getUTCMonth() + 1) + '/' + d.getUTCDate(); }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

function parseGviz(table) {
  const cols = table.cols.map(c => c.label);
  return table.rows.map(r => {
    const o = {};
    r.c.forEach((cell, i) => {
      const col = cols[i]; if (!col) return;
      o[col] = cell && cell.v != null ? (typeof cell.v === 'string' && cell.v.startsWith('Date(') ? (cell.f || cell.v) : cell.v) : '';
    });
    return o;
  });
}

// Assign a stable color per variety/seed
const _varColor = {};
function varietyColor(key) {
  if (!(key in _varColor)) _varColor[key] = VARIETY_COLORS[Object.keys(_varColor).length % VARIETY_COLORS.length];
  return _varColor[key];
}

async function load() {
  const table = await DataSource.fetchTable('lettuce_schedule');
  cycles = parseGviz(table).map(r => {
    const seed = parseUsDate(r.SeedingDate);
    const end = parseUsDate(r.HarvestDate) || parseUsDate(r.ExpHarvestDate);
    return {
      pond: (r.Pond || '').trim(),
      side: (r.Side || '').trim(),
      variety: (r.Variety || '').trim(),
      seedName: (r.SeedName || '').trim(),
      boards: +r.Boards || 0,
      seed, end,
      status: (r.Status || '').trim(),
    };
  }).filter(c => c.pond && c.seed && c.end && c.end > c.seed);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  render();
}

function render() {
  const today = hstToday();
  renderGantt(today);
  renderChecks(today);
  renderLegend();
}

// ── Gantt ──
function renderGantt(today) {
  const axisStart = new Date(today.getTime() - 7 * DAY);
  const axisEnd = new Date(today.getTime() + VIS_WEEKS * 7 * DAY);
  const totalDays = Math.round((axisEnd - axisStart) / DAY);
  const pct = d => Math.max(0, Math.min(100, (d - axisStart) / DAY / totalDays * 100));

  // group rows: pond -> sorted sides present
  const ponds = [...new Set(cycles.map(c => c.pond))].sort();
  const g = document.getElementById('gantt');
  g.innerHTML = '';

  // axis header
  const axisRow = document.createElement('div'); axisRow.className = 'g-row';
  let weeks = '';
  for (let d = 0; d <= totalDays; d += 7) {
    const dt = new Date(axisStart.getTime() + d * DAY);
    weeks += `<div class="g-week" style="left:${d / totalDays * 100}%">${fmtMD(dt)}</div>`;
  }
  weeks += `<div class="g-today" style="left:${pct(today)}%"></div>`;
  axisRow.innerHTML = `<div class="g-label"><span style="color:#999;font-weight:400;">pond/side</span></div><div class="g-track g-axis">${weeks}</div>`;
  g.appendChild(axisRow);

  const LANE_H = 13;
  ponds.forEach(pond => {
    const sides = [...new Set(cycles.filter(c => c.pond === pond).map(c => c.side))].sort();
    sides.forEach((side, i) => {
      const rows = cycles.filter(c => c.pond === pond && c.side === side && c.end >= axisStart && c.seed <= axisEnd)
        .sort((a, b) => a.seed - b.seed);
      // Greedy lane packing so overlapping cycles stack instead of hiding each other.
      const laneEnd = [];
      rows.forEach(c => {
        let lane = laneEnd.findIndex(e => e <= c.seed.getTime());
        if (lane === -1) { lane = laneEnd.length; laneEnd.push(0); }
        laneEnd[lane] = c.end.getTime();
        c._lane = lane;
      });
      const nLanes = Math.max(1, laneEnd.length);
      const h = nLanes * LANE_H + 4;
      const row = document.createElement('div'); row.className = 'g-row';
      let blocks = `<div class="g-today" style="left:${pct(today)}%"></div>`;
      rows.forEach(c => {
        const left = pct(c.seed), right = pct(c.end);
        const w = Math.max(0.5, right - left);
        const col = varietyColor(c.variety || c.seedName);
        const planned = c.status.toLowerCase().startsWith('planned') ? ' planned' : '';
        blocks += `<div class="g-block${planned}" style="left:${left}%;width:${w}%;top:${c._lane * LANE_H + 2}px;height:${LANE_H - 3}px;background:${col}" title="${esc(pond + side)} · ${esc(c.seedName)} · ${c.boards} boards · ${fmtMD(c.seed)}→${fmtMD(c.end)} · ${esc(c.status)}"></div>`;
      });
      const label = i === 0 ? `<b>${pond}</b>${side}` : `<span style="color:#aaa">${pond}</span>${side}`;
      row.innerHTML = `<div class="g-label" style="height:${h}px"><span>${label}</span></div><div class="g-track" style="min-width:680px;height:${h}px">${blocks}</div>`;
      g.appendChild(row);
    });
  });
}

// ── Fullness / balance check (per pond, next CHECK_WEEKS) ──
// Reports the actionable signal: how far out each pond is covered (stays full)
// before it draws down for lack of planned seedings, plus any over-capacity.
function renderChecks(today) {
  const start = today;
  const end = new Date(today.getTime() + CHECK_WEEKS * 7 * DAY);
  const ponds = Object.keys(CAP);
  const chips = document.getElementById('pond-chips');
  const issuesEl = document.getElementById('issues');
  chips.innerHTML = ''; issuesEl.innerHTML = '';
  const issues = [];

  ponds.forEach(pond => {
    const cap = CAP[pond];
    const cs = cycles.filter(c => c.pond === pond);
    let firstShort = null, maxOver = 0, overDate = null, minOn = Infinity, minDate = null, hasData = false;
    for (let t = start.getTime(); t <= end.getTime(); t += DAY) {
      const on = cs.filter(c => c.seed.getTime() <= t && c.end.getTime() > t).reduce((s, c) => s + c.boards, 0);
      if (on > 0) hasData = true;
      if (on < minOn) { minOn = on; minDate = new Date(t); }
      if (on < cap - TOL && firstShort === null) firstShort = new Date(t);
      if (on - cap > maxOver) { maxOver = on - cap; overDate = new Date(t); }
    }

    // chip
    let cls = 'full', note = 'full';
    if (!hasData) { cls = ''; note = 'no cycles'; }
    else if (firstShort) { cls = 'gap'; note = `→ ${fmtMD(new Date(firstShort.getTime() - DAY))}`; }
    else if (maxOver > TOL) { cls = 'over'; note = `over ${Math.round(maxOver)}`; }
    chips.innerHTML += `<span class="chip ${cls}"><b>${pond}</b> ${note}</span>`;

    if (hasData && firstShort) {
      issues.push({ pond, type: 'gap', covered: new Date(firstShort.getTime() - DAY), minOn: Math.round(minOn), minDate });
    }
    if (hasData && maxOver > TOL) {
      issues.push({ pond, type: 'over', maxOver: Math.round(maxOver), overDate });
    }
  });

  const shortCount = issues.filter(i => i.type === 'gap').length;
  const sum = document.getElementById('sum-status');
  sum.className = 'sum-box ' + (issues.length ? 'sum-warn' : 'sum-ok');
  sum.textContent = issues.length
    ? `${shortCount} pond${shortCount === 1 ? '' : 's'} run short within ${CHECK_WEEKS} wks`
    : 'Schedule clean — all ponds full';

  document.getElementById('issues-title').textContent = `Schedule issues — next ${CHECK_WEEKS} weeks`;
  if (!issues.length) {
    issuesEl.innerHTML = `<div class="none">All ponds stay full (±${TOL} boards) for the next ${CHECK_WEEKS} weeks.</div>`;
    return;
  }
  issues.sort((a, b) => (a.covered || a.overDate) - (b.covered || b.overDate));
  issues.forEach(it => {
    const div = document.createElement('div');
    div.className = 'issue ' + it.type;
    if (it.type === 'gap') {
      div.innerHTML = `<span class="pill">${it.pond}</span> full through <b>${fmtMD(it.covered)}</b>, then draws down — needs seedings (down to ${it.minOn} boards by ${fmtMD(it.minDate)}).`;
    } else {
      div.innerHTML = `<span class="pill">${it.pond}</span> over capacity by ${it.maxOver} boards around ${fmtMD(it.overDate)}.`;
    }
    issuesEl.appendChild(div);
  });
}

function renderLegend() {
  const keys = Object.keys(_varColor);
  document.getElementById('legend').innerHTML = keys.map(k => `<span><span class="sw" style="background:${_varColor[k]}"></span>${esc(k)}</span>`).join('')
    + '<span style="color:#999">· dashed = planned · solid = growing</span>';
}

load().catch(err => {
  document.getElementById('loading').textContent = 'Error: ' + (err.message || err);
  console.error(err);
});
</script>
</body>
</html>
