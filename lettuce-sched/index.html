<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lettuce Schedule</title>
<script src="../lib/data-source.js?v=20260622c"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0eb; color: #333; }
  #header { background: #4a8c5c; padding: 10px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  #header h1 { font-size: 1.5rem; color: #fff; font-weight: 700; }
  .hdr-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .hdr-as { font-size: 0.85rem; color: #fff; font-weight: 600; }
  #asof { font: inherit; padding: 2px 6px; border: 1px solid #bbb; border-radius: 4px; }
  #versionStamp { margin-left: auto; font-size: 0.7rem; color: #fff; opacity: 0.8; }
  #content { max-width: 1240px; margin: 0 auto; padding: 10px 24px; }

  /* Summary banner */
  .summary { display: flex; gap: 8px; align-items: stretch; margin-bottom: 16px; flex-wrap: wrap; }
  .sum-box { padding: 10px 16px; border-radius: 4px; font-size: 1.1rem; font-weight: 600; }
  .sum-ok   { background: #d3f3dd; color: #2f7d4f; border: 1px solid #a8e0bb; }
  .sum-warn { background: #fdecc8; color: #9a6a00; border: 1px solid #f0d890; }
  .pond-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .chip { font-size: 0.78rem; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; background: #fff; white-space: nowrap; }
  .chip b { font-weight: 600; }
  .chip.full { border-color: #a8e0bb; background: #eefbf2; }
  .chip.gap  { border-color: #f0c0c0; background: #fdeeee; color: #b3402f; }
  .chip.over { border-color: #f0d890; background: #fdf6e3; color: #9a6a00; }

  /* Gantt */
  .section-title { font-size: 1.05rem; font-weight: 600; color: #333; margin: 8px 0 6px; }
  #gantt { background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow-x: auto; }
  .g-row { display: flex; align-items: stretch; border-bottom: 1px solid #eee; min-height: 13px; background: #fff; }
  .g-row:last-child { border-bottom: none; }
  .g-row.pond-start { border-top: 3px solid #c9b896; }
  .g-label { flex: 0 0 100px; min-width: 0; overflow: hidden; padding: 0 8px; gap: 6px; font-size: 0.72rem; line-height: 1; color: #444; border-right: 1px solid #e6e0d8; position: sticky; left: 102px; z-index: 5; background: inherit; display: flex; align-items: center; justify-content: space-between; }
  /* Counts table (left of sim) + axis header */
  .c-cell { flex: 0 0 34px; min-width: 0; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; line-height: 1; color: #444; border-right: 1px solid #f0ece6; position: sticky; background: inherit; z-index: 5; }
  .c-cell.c-harv { left: 0; }
  .c-cell.c-pond { left: 34px; }
  .c-cell.c-seed { left: 68px; border-right: 2px solid #c9b896; }
  .c-cell.c-zero { color: #ccc; }
  .c-cell.c-mismatch { color: #d33; font-weight: 700; }   /* on-pond ≠ harvest for that pond/side */
  .g-head { background: #faf7f2; min-height: 22px; border-bottom: 2px solid #c9b896; font-size: 0.55rem; font-weight: 700; letter-spacing: 0; color: #999; }
  .g-head .c-cell, .g-head .g-label { color: #999; }
  .g-head .g-track { position: relative; overflow: visible; }
  .g-head .g-track span { font-size: 0.74rem; font-weight: 800; color: #555; white-space: nowrap; padding: 0 3px; line-height: 22px; }
  .ax-harv { position: sticky; left: 8px; }
  /* Seedling right-aligned at the cap (110-row) line; cycles past it are future/off-pond.
     No background so its full-width box never paints over the Harvest label at track-left. */
  .ax-seed { position: absolute; left: 0; text-align: right; padding-right: 6px; }
  .g-foot { background: #faf7f2; border-top: 2px solid #c9b896; font-weight: 700; }
  .g-foot .c-cell, .g-foot .g-label { color: #555; }
  .step-btn { font: inherit; font-size: 0.8rem; padding: 3px 9px; border: 1px solid #bbb; border-radius: 4px; background: #fff; cursor: pointer; }
  .g-label .cap { color: #999; font-weight: 400; font-size: 0.7rem; }
  .g-track { position: relative; flex: 1 1 auto; }
  .g-axis { height: 22px; }
  .g-week { position: absolute; top: 0; bottom: 0; border-left: 1px solid #eee; font-size: 0.66rem; color: #aaa; padding-left: 3px; }
  .g-today { position: absolute; top: 0; bottom: 0; border-left: 2px solid #e07a5f; z-index: 3; }
  .g-cap { position: absolute; top: 0; bottom: 0; border-left: 4px solid #555; z-index: 2; }
  .g-cap span { position: absolute; top: 1px; left: 3px; font-size: 0.6rem; color: #888; white-space: nowrap; }
  .g-block { position: absolute; top: 1px; bottom: 1px; border-radius: 2px; overflow: hidden; border: 1px solid rgba(0,0,0,0.7); color: #fff; font-size: 0.78rem; font-weight: 700; line-height: 1; white-space: nowrap; text-shadow: 0 0 2px rgba(0,0,0,0.9), 0 1px 1px rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; }
  .g-block .lbl-days { display: none; }
  #gantt.show-days .g-block .lbl-rows { display: none; }
  #gantt.show-days .g-block .lbl-days { display: inline; }
  .g-row.side-c .g-block { font-size: 0.58rem; }
  .toggle { display: inline-flex; border: 1px solid #bbb; border-radius: 5px; overflow: hidden; font-size: 0.72rem; font-weight: 600; }
  .toggle button { border: none; background: #fff; color: #555; padding: 3px 12px; cursor: pointer; font: inherit; }
  .toggle button.active { background: #25623c; color: #fff; }
  #labelToggle { margin-left: 24px; }
  #filterwarn { margin: 0 0 12px; background: #fdf6e3; border: 1px solid #f0d890; color: #9a6a00; border-radius: 6px; padding: 8px 12px; font-size: 0.85rem; font-weight: 600; }
  .g-block.planned { opacity: 0.6; border-style: dashed; }

  /* Issues + legend */
  .issue { border-bottom: 1px solid #eee; padding: 7px 4px; font-size: 0.85rem; }
  .issue:last-child { border-bottom: none; }
  .issue .pill { display: inline-block; min-width: 30px; font-weight: 600; color: #4a8c5c; }
  .issue.gap  .pill { color: #b3402f; }
  .issue.over .pill { color: #9a6a00; }
  .none { color: #888; font-size: 0.9rem; padding: 8px 4px; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; font-size: 0.76rem; color: #555; }
  .legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }
  #loading { padding: 40px; text-align: center; color: #4a8c5c; }
</style>
</head>
<body>

<div id="header">
  <h1>Lettuce Schedule</h1>
  <div class="hdr-controls">
    <span class="hdr-as">As of</span>
    <button id="asofPrev" class="step-btn" title="Previous day">◄</button>
    <input type="date" id="asof" min="2026-01-01" max="2026-12-31">
    <button id="asofNext" class="step-btn" title="Next day">►</button>
    <span class="toggle" id="labelToggle">
      <button data-mode="rows" class="active">Rows</button><button data-mode="days">Days</button>
    </span>
  </div>
  <span id="versionStamp">06-22</span>
</div>

<div id="content">
  <div id="loading">Loading schedule…</div>
  <div id="main" style="display:none;">
    <div id="filterwarn" style="display:none;"></div>
    <div id="gantt"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<script>
// ── Config ──
const CAP = { P1: 830, P2: 2200, P3: 2200, P4: 2200, P5: 2200, P6: 2200, P7: 2200 };
const VIS_WEEKS = 6;          // visual horizon
const CHECK_WEEKS = 8;        // fullness/balance check horizon (~2 months)
const TOL = 100;              // boards tolerance before flagging under/over (5 rows)
const DAY = 86400000;
const GA_GREEN = '#2e7d32', GL_YELLOW = '#f1c40f';    // dark green / yellow
const VARIETY_FIXED = {
  GA: GA_GREEN,                                        // dark green
  GL: GL_YELLOW,                                       // yellow
  RL: '#e74c3c',                                       // red
  WC: '#4a90d9',                                       // blue
  MS: '#5cab4a',                                       // medium green (mixed seeds)
};
const VARIETY_FALLBACK = ['#f0a030','#9b59b6','#16a085','#e67e22','#2c7fb8','#8e44ad','#27ae60'];

let cycles = [];
let asOf = hstToday();   // "run as of" date; drives the whole view (default today)

function parseUsDate(v) {
  if (!v) return null;
  let m = String(v).match(/Date\((\d+),(\d+),(\d+)/);
  if (m) return new Date(Date.UTC(+m[1], +m[2], +m[3]));
  m = String(v).match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (!m) return null;
  let y = +m[3]; if (y < 100) y += 2000;
  return new Date(Date.UTC(y, +m[1] - 1, +m[2]));
}
function hstToday() {
  const h = new Date(new Date().getTime() - 10 * 3600000);
  return new Date(Date.UTC(h.getUTCFullYear(), h.getUTCMonth(), h.getUTCDate()));
}
function fmtMD(d) { return (d.getUTCMonth() + 1) + '/' + d.getUTCDate(); }
function fmtMD2(d) { return String(d.getUTCMonth() + 1).padStart(2, '0') + '/' + String(d.getUTCDate()).padStart(2, '0'); }
function ymd(d) { return d.getUTCFullYear() + '-' + String(d.getUTCMonth() + 1).padStart(2, '0') + '-' + String(d.getUTCDate()).padStart(2, '0'); }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

function parseGviz(table) {
  const cols = table.cols.map(c => c.label);
  return table.rows.map(r => {
    const o = {};
    r.c.forEach((cell, i) => {
      const col = cols[i]; if (!col) return;
      o[col] = cell && cell.v != null ? (typeof cell.v === 'string' && cell.v.startsWith('Date(') ? (cell.f || cell.v) : cell.v) : '';
    });
    return o;
  });
}

// Fixed color per variety code (MS = light+dark green stripes); unknowns rotate the fallback palette.
const _varColor = {};
let _fallbackN = 0;
function varietyColor(key) {
  if (!(key in _varColor)) {
    _varColor[key] = VARIETY_FIXED[key] || VARIETY_FALLBACK[_fallbackN++ % VARIETY_FALLBACK.length];
  }
  return _varColor[key];
}

const MIN_ROWS = 1000;   // 2026 query normally returns ~1,300 rows; fewer ⇒ sheet likely filtered

async function load() {
  const table = await DataSource.fetchTable('lettuce_schedule');

  // A basic filter on the source sheet silently truncates the gviz feed. We can't
  // read the filter directly, so warn when far fewer rows than expected come back.
  const rawCount = (table.rows || []).length;
  const warn = document.getElementById('filterwarn');
  if (rawCount < MIN_ROWS) {
    warn.textContent = `⚠ Only ${rawCount.toLocaleString()} rows loaded (normally ~1,300). `
      + `The source sheet likely has a filter applied — clear it so the dashboard sees all data.`;
    warn.style.display = 'block';
  } else {
    warn.style.display = 'none';
  }

  cycles = parseGviz(table).map(r => {
    const seed = parseUsDate(r.SeedingDate);
    const ponded = parseUsDate(r.PondDate);
    const end = parseUsDate(r.HarvestDate) || parseUsDate(r.ExpHarvestDate);
    return {
      pond: (r.Pond || '').trim(),
      side: (r.Side || '').trim(),
      variety: (r.Variety || '').trim(),
      seedName: (r.SeedName || '').trim(),
      seedsPerBoard: +r.SeedsPerBoard || 0,
      boards: +r.Boards || 0,
      seed, ponded, end,
      harv: parseUsDate(r.HarvestDate),
      exp: parseUsDate(r.ExpHarvestDate),
      status: (r.Status || '').trim(),
    };
  }).filter(c => c.pond && c.seed && c.end && c.end > c.seed)
    // Keep only cycles active during 2026 (seeded by year-end, harvest in/after Jan).
    .filter(c => c.end.getTime() >= Date.UTC(2026, 0, 1) && c.seed.getTime() <= Date.UTC(2026, 11, 31));

  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  // As-of date picker: default today, re-render everything on change.
  const inp = document.getElementById('asof');
  inp.value = ymd(asOf);
  inp.addEventListener('change', () => {
    const v = inp.value; if (!v) return;
    const [y, m, d] = v.split('-').map(Number);
    asOf = new Date(Date.UTC(y, m - 1, d));
    render();
  });
  const stepDay = n => {
    const t = asOf.getTime() + n * DAY;
    if (t < Date.UTC(2026, 0, 1) || t > Date.UTC(2026, 11, 31)) return; // clamp to 2026
    asOf = new Date(t); inp.value = ymd(asOf); render();
  };
  document.getElementById('asofPrev').addEventListener('click', () => stepDay(-1));
  document.getElementById('asofNext').addEventListener('click', () => stepDay(1));

  render();
}

function render() {
  renderGantt(asOf);
  renderLegend();
}

// ── Pond rows: one row per pond/side, cycles tiled by board size in harvest
// order (next-to-harvest on the left). A pond header shows current fill vs cap.
function renderGantt(today) {
  const ROW_PX = 6;                                    // px per row
  const capRows = p => (p === 'P1' ? 83 : 110);        // rows that fill a side
  // Each side runs the full length of rows, at its own board-width.
  // A=10; B=9 on P2-3, 10 elsewhere; C=1; AB (P5-7)=20. P1 is one 10-wide side.
  const sideWidth = (pond, side) => {
    if (pond === 'P1') return 10;
    const s = (side || '').trim().toUpperCase();
    if (s === 'AB') return 20;
    if (s[0] === 'A') return 10;
    if (s[0] === 'B') return (pond === 'P2' || pond === 'P3') ? 9 : 10;
    if (s[0] === 'C') return 1;
    return 20;
  };
  const ponds = [...new Set(cycles.map(c => c.pond))].sort();
  const g = document.getElementById('gantt');
  g.innerHTML = '';
  const dEq = (a, b) => a && b && a.getTime() === b.getTime();   // same calendar day

  // Header: counts-column labels + harvest→seedling direction over the sim track.
  const head = document.createElement('div');
  head.className = 'g-row g-head';
  head.innerHTML = `<div class="c-cell c-harv" title="Boards with expected harvest on this date">Harv</div>`
    + `<div class="c-cell c-pond" title="Boards going on pond on this date">Pond</div>`
    + `<div class="c-cell c-seed" title="Boards seeding on this date">Seed</div>`
    + `<div class="g-label"><span></span><span class="cap">#rows</span></div>`
    + `<div class="g-track" id="axisTrack"><span class="ax-harv">◄ Harvest</span><span class="ax-seed" style="width:${110 * ROW_PX}px">Seedling ►</span></div>`;
  g.appendChild(head);
  let maxTrackW = 0, tH = 0, tP = 0, tS = 0;

  // Pond total height is fixed so every full pond is the same size: P2-P7 = POND_H
  // (total width 20/row), P1 = POND_H/2 (width 10/row). Within a pond the height is
  // split across its populated sides ∝ board-width, with a readable floor per side.
  const POND_H = 60, MIN_SIDE = 12;

  ponds.forEach((pond, pi) => {
    const capR = capRows(pond);
    const capX = capR * ROW_PX;
    const pondH = pond === 'P1' ? POND_H / 2 : POND_H;

    const sides = [...new Set(cycles.filter(c => c.pond === pond).map(c => c.side))].sort();
    // Gather only sides that actually have cycles, then allocate heights.
    const rows = sides.map(side => {
      const w = sideWidth(pond, side);
      // End-of-day semantics: a cycle actually harvested on/before the as-of date is
      // off the pond; un-harvested cycles stay visible even past expected harvest.
      const list = cycles.filter(c => c.pond === pond && c.side === side && !(c.harv && c.harv <= today))
        .sort((a, b) => a.end - b.end); // soonest harvest first (leftmost)
      return list.length ? { side, w, list } : null; // drop empty sides (e.g. P1B)
    }).filter(Boolean);
    if (!rows.length) return;
    const sumW = rows.reduce((s, r) => s + r.w, 0);
    const extra = Math.max(0, pondH - MIN_SIDE * rows.length); // shared on top of the floor
    let used = 0;
    rows.forEach((r, i) => {
      r.h = i === rows.length - 1 ? pondH - used                 // last side absorbs rounding
        : Math.round(MIN_SIDE + extra * r.w / sumW);
      used += r.h;
    });

    let firstInPond = true;
    rows.forEach(({ side, w, list, h: rowH }) => {
      let x = 0, blocks = '', totalRows = 0, prevDays = null, cumRows = 0, capPos = null;
      list.forEach(c => {
        const r = c.boards / w;
        const notOnPond = !c.ponded || c.ponded > today; // no pond date yet, or future → fade
        const faded = notOnPond ? ' planned' : '';
        if (!notOnPond) totalRows += r;                // fill readout = on-pond only
        const bw = Math.max(4, r * ROW_PX);
        const col = varietyColor(c.variety || c.seedName);
        const pondDays = Math.round((c.end - (c.ponded || c.seed)) / DAY); // days on pond (pond date → harvest)
        // day-number color: red if overdue (>28), else grey if it jumps >2 from the prior cycle
        // (drop the dark halo on colored numbers so the color reads clean)
        let dayStyle = '';
        if (pondDays > 28) dayStyle = ' style="color:#ff5252;text-shadow:none"';
        else if (prevDays != null && Math.abs(pondDays - prevDays) > 2) dayStyle = ' style="color:#333;text-shadow:none"';
        prevDays = pondDays;
        // Cap line goes where cumulative rows cross the cap, in tiled pixel
        // coords (blocks carry 1px gaps + 4px minimums, so rows*ROW_PX drifts).
        if (capPos === null && cumRows + r >= capR - 0.01) capPos = x + ((capR - cumRows) / r) * bw;
        cumRows += r;
        blocks += `<div class="g-block${faded}" style="left:${x}px;width:${bw}px;background:${col}" title="S:${fmtMD2(c.seed)}, H:${fmtMD2(c.end)}, #:${Math.round((c.end - c.seed) / DAY)}, D:${c.seedsPerBoard}"><span class="lbl-rows">${Math.round(r)}</span><span class="lbl-days"${dayStyle}>${pondDays}</span></div>`;
        x += bw + 1;
      });
      blocks += `<div class="g-cap" style="left:${Math.round(capPos ?? capX)}px"></div>`;
      const rr = Math.round(totalRows);
      const lc = rr === capR ? '#2f7d4f' : '#b3402f'; // green only if exactly full, else red
      const row = document.createElement('div'); row.className = 'g-row';
      if ((side || '').trim().toUpperCase()[0] === 'C') row.classList.add('side-c'); // thin 1-wide row → smaller label
      if (pi > 0 && firstInPond) row.classList.add('pond-start'); // thick line between ponds
      firstInPond = false;
      row.style.minHeight = rowH + 'px';
      const trackW = Math.max(x, capX) + 40;
      maxTrackW = Math.max(maxTrackW, trackW);
      // Counts (boards) for this pond/side falling on the as-of date.
      const all = cycles.filter(c => c.pond === pond && c.side === side);
      const nH = Math.round(all.filter(c => dEq(c.end, today)).reduce((s, c) => s + c.boards, 0)); // actual harvest if present, else expected
      const nP = Math.round(all.filter(c => dEq(c.ponded, today)).reduce((s, c) => s + c.boards, 0));
      const nS = Math.round(all.filter(c => dEq(c.seed, today)).reduce((s, c) => s + c.boards, 0));
      tH += nH; tP += nP; tS += nS;
      const cc = (v, cls, red) => `<div class="c-cell ${cls}${v ? '' : ' c-zero'}${red ? ' c-mismatch' : ''}">${v}</div>`;
      row.innerHTML = cc(nH, 'c-harv') + cc(nP, 'c-pond', nP !== nH) + cc(nS, 'c-seed')
        + `<div class="g-label"><span style="color:#444;font-weight:600">${esc(pond + side)}</span><span class="cap" style="color:${lc};font-weight:600">${rr}</span></div>`
        + `<div class="g-track" style="height:${rowH}px;min-width:${trackW}px">${blocks}</div>`;
      g.appendChild(row);
    });
  });
  // Totals row under the counts table.
  const foot = document.createElement('div');
  foot.className = 'g-row g-foot';
  const fc = (v, cls) => `<div class="c-cell ${cls}">${v}</div>`;
  foot.innerHTML = fc(tH, 'c-harv') + fc(tP, 'c-pond') + fc(tS, 'c-seed')
    + `<div class="g-label"><span>Total</span></div><div class="g-track"></div>`;
  g.appendChild(foot);

  const at = document.getElementById('axisTrack');
  if (at) at.style.minWidth = maxTrackW + 'px';
}

function renderLegend() {
  const keys = Object.keys(_varColor);
  document.getElementById('legend').innerHTML = keys.map(k => `<span><span class="sw" style="background:${_varColor[k]}"></span>${esc(k)}</span>`).join('')
    + '<span style="color:#999">· faded = not yet on pond · solid = on pond · block # = rows or days on pond (toggle)</span>';
}

// Rows/Days toggle: flips a class on #gantt so CSS swaps which label shows.
document.getElementById('labelToggle').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  document.querySelectorAll('#labelToggle button').forEach(x => x.classList.toggle('active', x === b));
  document.getElementById('gantt').classList.toggle('show-days', b.dataset.mode === 'days');
});

load().catch(err => {
  document.getElementById('loading').textContent = 'Error: ' + (err.message || err);
  console.error(err);
});
</script>
</body>
</html>
