<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="../lib/data-source.js?v=20260622c"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0eb; color: #333; }
  #header { background: #4a8c5c; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  #header h1 { font-size: 1.5rem; color: #fff; font-weight: 700; }
  #content { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }
  #date-line { font-size: 1rem; color: #333; margin-bottom: 12px; }
  .toggle-bar { display: flex; gap: 0; margin-bottom: 16px; }
  .toggle-btn { padding: 6px 16px; font-size: 0.85rem; border: 1px solid #999; background: #e0dbd5; color: #666; cursor: pointer; }
  .toggle-btn:first-child { border-radius: 4px 0 0 4px; }
  .toggle-btn:last-child { border-radius: 0 4px 4px 0; }
  .toggle-btn.active { background: #4a8c5c; color: #fff; border-color: #4a8c5c; }
  .date-picker { margin-left: 12px; padding: 5px 10px; font-size: 0.85rem; border: 1px solid #999; border-radius: 4px; background: #e0dbd5; color: #666; cursor: pointer; font-family: inherit; }
  .date-picker.active { background: #4a8c5c; color: #fff; border-color: #4a8c5c; }
  .date-picker.active::-webkit-calendar-picker-indicator { filter: invert(1); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 24px; }
  th { text-align: left; padding: 6px 10px; border-bottom: 2px solid #ccc; color: #4a8c5c; font-weight: 600; }
  th.num, td.num { text-align: right; }
  td { padding: 5px 10px; border-bottom: 1px solid #ddd; }
  tr.total-row td { border-top: 2px solid #999; font-weight: 600; }
  .section-title { font-size: 1.1rem; font-weight: 600; color: #333; margin: 24px 0 8px; }
  .chart-box { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 24px; border: 1px solid #ddd; }
  .chart-box h3 { font-size: 1rem; font-weight: 600; color: #333; margin-bottom: 8px; }
  .chart-wrap { position: relative; height: 300px; }
  /* Food-safety header strip */
  .fs-strip { display: flex; gap: 8px; margin-bottom: 14px; }
  .fs-box { padding: 10px 16px; border-radius: 4px; font-size: 1.15rem; font-weight: 600; line-height: 1.3; }
  .fs-clean { flex: 1; background: #d3f3dd; color: #2f7d4f; border: 1px solid #a8e0bb; }
  .fs-clean .fs-sub { font-size: 0.72rem; font-weight: 400; color: #5a9a72; }
  .fs-ca { flex: 1; background: #fbe2e2; color: #c0392b; border: 1px solid #f0c0c0; display: flex; align-items: center; }
  .fs-ca.zero { background: #eef3ee; color: #6a8a6a; border-color: #d8e2d8; }
  .fs-checks { flex: 1; background: #fdecc8; color: #9a6a00; border: 1px solid #f0d890; display: flex; align-items: center; }
  .fs-checks.zero { background: #eef3ee; color: #6a8a6a; border-color: #d8e2d8; }
  /* Source settings gear */
  .gear-btn { background: transparent; border: none; color: #fff; font-size: 1.05rem; cursor: pointer; padding: 2px 6px; line-height: 1; }
  /* Corrective-action detail list */
  .ca-list { margin-bottom: 24px; }
  .ca-item { border-bottom: 1px solid #ddd; padding: 8px 4px; font-size: 0.85rem; }
  .ca-item:last-child { border-bottom: none; }
  .ca-item .ca-warn { color: #333; }
  .ca-item .ca-act { color: #4a8c5c; }
  .ca-item .ca-meta { color: #999; font-size: 0.72rem; margin-bottom: 2px; }
  .ca-none { color: #888; font-size: 0.85rem; padding: 6px 4px; }
</style>
</head>
<body>

<div id="header">
  <h1>Daily</h1>
  <span style="display:flex;align-items:center;gap:6px;">
    <button class="gear-btn" id="srcGear" title="Data sources">&#9881;</button>
    <span style="font-size:0.7rem;color:#fff;" id="versionStamp">06-21 12:00</span>
  </span>
</div>

<div id="content">
  <div class="fs-strip" id="fs-strip" style="display:none;">
    <div class="fs-box fs-clean" id="fs-clean"></div>
    <div class="fs-box fs-ca" id="fs-ca"></div>
    <div class="fs-box fs-checks" id="fs-checks"></div>
  </div>
  <div id="date-line"></div>
  <div class="toggle-bar">
    <button class="toggle-btn active" id="btnToday" onclick="setDay('today')">Today</button>
    <button class="toggle-btn" id="btnYesterday" onclick="setDay('yesterday')">Yesterday</button>
    <input type="date" class="date-picker" id="datePicker" onchange="setDate(this.value)">
  </div>

  <div id="sales-section">
    <table id="sales-table"><thead><tr>
      <th>$ (000)</th><th class="num">TDY</th><th class="num">WTD</th><th class="num">MTD</th><th class="num">YTD</th><th class="num">LYTD</th><th class="num">Chg</th>
    </tr></thead><tbody id="sales-tbody"></tbody></table>
  </div>

  <div class="chart-box">
    <h3>Weekly $ (000)</h3>
    <div class="chart-wrap"><canvas id="weeklyChart"></canvas></div>
  </div>

  <div class="section-title">Cuke Pounds</div>
  <table id="cuke-table"><thead><tr>
    <th>GH</th><th class="num">Day</th><th class="num">K1</th><th class="num">J1</th><th class="num">E1</th><th class="num">K2</th><th class="num">J2</th><th class="num">E2</th><th class="num">Total</th><th class="num">% OG</th>
  </tr></thead><tbody id="cuke-tbody"></tbody></table>

  <div class="section-title">Lettuce Pounds</div>
  <table id="lettuce-table"><thead><tr>
    <th>Pond</th><th>Variety</th><th class="num">Boards</th><th class="num">Lb/Board</th><th class="num">Total</th>
  </tr></thead><tbody id="lettuce-tbody"></tbody></table>

  <div class="section-title">Lettuce POs — next 7 days</div>
  <table id="po-table"><thead><tr>
    <th>Pack Date</th><th class="num">lb</th><th class="num">Cases</th><th class="num">LW</th><th class="num">LF</th><th class="num">LR</th><th class="num">WR</th>
  </tr></thead><tbody id="po-tbody"></tbody></table>

  <div class="section-title" id="ca-title">Corrective Actions</div>
  <div class="ca-list" id="ca-list"></div>

  <div class="section-title" id="dc-title">Data Checks</div>
  <div class="ca-list" id="dc-list"></div>
</div>

<script>
// ── Data ──
// Invoices, cuke harvest, and lettuce harvest all flow through DataSource
// (sheets | prod toggle; see ../lib/data-source.js). Lettuce's
// BoardsPerPond / PoundsPerBoard / GreenhouseNetWeight are reconstructed
// from grow_harvest_weight.number_of_containers + net_weight via
// grow_lettuce_harvest_v.

let invoiceRows = [];
let cukeGrowRows = [];
let lettuceGrowRows = [];
let empRows = [];   // fsafe_log_emp — environmental pathogen tests
let caRows = [];    // fsafe_log_corrective_action — corrective-action log
let poRows = [];    // lettuce_pack_orders — forward-looking POs
let checkRules = [];          // data_check_rule (prod Supabase)
let preopData = {};           // logical table name -> pre-op rows
const _loggedCheckDates = new Set();
let weeklyChart = null;

// Maps a rule's harvest_key to the already-loaded harvest rows (avoids refetch).
const HARVEST_ROWS = { cuke: () => cukeGrowRows, lettuce: () => lettuceGrowRows };

const SKU_LB = { LW: 10.5, LR: 2.25, LF: 10.0, WR: 2.25 };
// A pathogen "hit" = positive EMP result for one of these (excludes APC / indicator E. coli)
const PATHOGEN_RE = /listeria|salmonella|o157/i;

// Parse "M/D/YYYY" or "M/D/YYYY HH:MM:SS" (gviz date cells expose this as cell.f)
// into a UTC-midnight Date. Returns null if unparseable.
function parseUsDate(v) {
  if (!v) return null;
  // gviz raw form Date(y,mo,d,...) — month is 0-indexed
  let m = String(v).match(/Date\((\d+),(\d+),(\d+)/);
  if (m) return new Date(Date.UTC(+m[1], +m[2], +m[3]));
  // formatted "M/D/YYYY" (optionally with a time after)
  m = String(v).match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (!m) return null;
  let y = +m[3];
  if (y < 100) y += 2000;
  return new Date(Date.UTC(y, +m[1] - 1, +m[2]));
}
function sameDay(v, rd) {
  const dt = parseUsDate(v);
  return !!dt && dt.getTime() === rd.getTime();
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function parseGvizTable(table) {
  const cols = table.cols.map(c => c.label);
  return table.rows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => {
      const col = cols[i];
      if (!col) return;
      if (!cell || cell.v === null || cell.v === undefined) { obj[col] = ''; return; }
      if (typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
        // Match both Date(y,m,d) and datetime Date(y,m,d,h,mi,s) — the latter
        // (e.g. fsafe SampleDateTime) was previously dropped, leaving obj[col] unset.
        const dm = cell.v.match(/Date\((\d+),(\d+),(\d+)/);
        if (dm) {
          obj[col] = cell.f || cell.v;
          obj['_y'] = parseInt(dm[1]);
          obj['_m'] = parseInt(dm[2]) + 1;
          obj['_d'] = parseInt(dm[3]);
          obj['_md'] = obj['_m'] * 100 + obj['_d'];
          const dt = new Date(Date.UTC(obj['_y'], obj['_m'] - 1, obj['_d']));
          obj['_dow'] = dt.getUTCDay();
          const tmp = new Date(Date.UTC(obj['_y'], obj['_m'] - 1, obj['_d']));
          tmp.setUTCDate(tmp.getUTCDate() + 4 - (tmp.getUTCDay() || 7));
          const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
          obj['_isoWeek'] = Math.ceil(((tmp - yearStart) / 86400000 + 1) / 7);
        }
      } else if (typeof cell.v === 'number') {
        obj[col] = cell.v;
      } else {
        obj[col] = cell.v;
      }
    });
    return obj;
  });
}

// ── Reference date logic ──
function hstNow() {
  return new Date(new Date().getTime() - 10 * 3600000);
}
function hstToday() {
  const h = hstNow();
  return new Date(Date.UTC(h.getUTCFullYear(), h.getUTCMonth(), h.getUTCDate()));
}

let refDate = hstToday();
let dayMode = 'today';

function fmtDateInput(d) {
  const m = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(d.getUTCDate()).padStart(2, '0');
  return `${d.getUTCFullYear()}-${m}-${dd}`;
}

function syncControls() {
  document.getElementById('btnToday').classList.toggle('active', dayMode === 'today');
  document.getElementById('btnYesterday').classList.toggle('active', dayMode === 'yesterday');
  document.getElementById('datePicker').classList.toggle('active', dayMode === 'date');
  document.getElementById('datePicker').value = fmtDateInput(refDate);
  document.getElementById('date-line').textContent = refDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' });
}

function setDay(mode) {
  dayMode = mode;
  refDate = hstToday();
  if (mode === 'yesterday') refDate.setUTCDate(refDate.getUTCDate() - 1);
  syncControls();
  render();
}

function setDate(val) {
  if (!val) return;
  const [y, m, d] = val.split('-').map(Number);
  refDate = new Date(Date.UTC(y, m - 1, d));
  dayMode = 'date';
  syncControls();
  render();
}

function render() {
  renderFsHeader();
  renderSalesTable();
  renderWeeklyChart();
  renderCukeTable();
  renderLettuceTable();
  renderPoTable();
  renderCaSection();
  renderDataChecks();
}

// ── Data-quality checks (rules from prod; pre-op presence => harvest expected) ──
function renderDataChecks() {
  const rd = refDate;
  const isRefDay = r => r._y === rd.getUTCFullYear() && r._m === (rd.getUTCMonth() + 1) && r._d === rd.getUTCDate();
  const evaluated = [];
  checkRules.forEach(rule => {
    const preop = preopData[rule.preop_table] || [];
    const dateCol = rule.preop_date_col || 'Checked Date';
    const flagCol = rule.preop_flag_col || 'Approved to Harvest';
    // Only an expectation on days the pre-op approved harvest.
    const approvedRows = preop.filter(r => sameDay(r[dateCol], rd) && String(r[flagCol]).toLowerCase() === 'true');
    if (!approvedRows.length) return;

    // Expected count: a fixed number, or 'preop' = distinct members listed in
    // the pre-op (e.g. the cuke Greenhouse(s) field).
    let expected;
    if (String(rule.expected).toLowerCase() === 'preop') {
      const sep = rule.preop_members_sep || '+';
      const set = new Set();
      approvedRows.forEach(r => String(r[rule.preop_members_col] || '')
        .split(sep).map(s => s.trim()).filter(Boolean).forEach(m => set.add(m)));
      expected = set.size;
    } else {
      expected = Number(rule.expected) || 0;
    }
    if (!expected) return; // can't determine an expectation -> skip

    // Actual: distinct values of the dimension in that day's harvest rows.
    const rows = (HARVEST_ROWS[rule.harvest_key] || (() => []))().filter(isRefDay);
    const actual = new Set(rows.map(r => String(r[rule.dimension] || '').trim()).filter(Boolean)).size;
    const passed = actual >= expected;
    const detail = passed ? null
      : String(rule.message || rule.name).replace('{actual}', actual).replace('{expected}', expected);
    evaluated.push({ rule, passed, detail });
  });
  const fails = evaluated.filter(e => !e.passed);

  const box = document.getElementById('fs-checks');
  box.textContent = `Data issues = ${fails.length}`;
  box.classList.toggle('zero', fails.length === 0);

  const dateStr = rd.toLocaleDateString('en-US', { month: 'long', day: 'numeric', timeZone: 'UTC' });
  document.getElementById('dc-title').textContent = `Data Checks — ${dateStr}`;
  const list = document.getElementById('dc-list');
  list.innerHTML = '';
  if (!fails.length) {
    list.innerHTML = '<div class="ca-none">All checks passed.</div>';
  } else {
    fails.forEach(f => {
      const div = document.createElement('div');
      div.className = 'ca-item';
      div.innerHTML = `<div class="ca-warn">⚠ ${escapeHtml(f.detail)}</div>`;
      list.appendChild(div);
    });
  }
  logCheckResults(rd, evaluated);
}

// Phase 1 logging: upsert this date's evaluated results to prod (idempotent;
// once per date per session so date-navigation doesn't spam writes).
async function logCheckResults(rd, evaluated) {
  if (!evaluated.length) return;
  const key = fmtDateInput(rd);
  if (_loggedCheckDates.has(key)) return;
  _loggedCheckDates.add(key);
  try {
    const client = await DataSource.getClient('prod');
    const payload = evaluated.map(e => ({
      rule_id: e.rule.id, checked_date: key, passed: e.passed, detail: e.detail, run_at: new Date().toISOString(),
    }));
    const { error } = await client.from('data_check_result').upsert(payload, { onConflict: 'rule_id,checked_date' });
    if (error) { console.error('data_check_result upsert error:', error); _loggedCheckDates.delete(key); }
  } catch (e) { console.error('logCheckResults error:', e); _loggedCheckDates.delete(key); }
}

// ── Food-safety header strip ──
function renderFsHeader() {
  const rd = refDate;

  // Pathogen-free = days since most recent positive pathogen EMP result on/before refDate
  let lastHit = null;
  empRows.forEach(r => {
    if (String(r.PositiveResults).toLowerCase() !== 'true') return;
    if (!PATHOGEN_RE.test(String(r.TestName || ''))) return;
    const dt = parseUsDate(r.SampleDateTime);
    if (!dt || dt.getTime() > rd.getTime()) return;
    if (!lastHit || dt.getTime() > lastHit.getTime()) lastHit = dt;
  });

  const cleanEl = document.getElementById('fs-clean');
  if (lastHit) {
    const days = Math.floor((rd.getTime() - lastHit.getTime()) / 86400000);
    cleanEl.innerHTML = `Pathogen free for ${days} day${days === 1 ? '' : 's'}` +
      `<div class="fs-sub">last hit ${lastHit.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' })}</div>`;
  } else {
    cleanEl.textContent = empRows.length ? 'Pathogen free' : 'Pathogen data unavailable';
  }

  // CAs reported on refDate
  const caCount = caRows.filter(r => sameDay(r.ReportedDate, rd)).length;
  const caEl = document.getElementById('fs-ca');
  caEl.textContent = `CAs = ${caCount}`;
  caEl.classList.toggle('zero', caCount === 0);

  document.getElementById('fs-strip').style.display = 'flex';
}

// ── Lettuce POs (next 7 days) ──
function renderPoTable() {
  const rd = refDate;
  const start = rd.getTime();
  const end = start + 6 * 86400000; // inclusive window of 7 calendar days

  const byDate = {};
  poRows.forEach(r => {
    const dt = parseUsDate(r.PackDate) || (r._y ? new Date(Date.UTC(r._y, r._m - 1, r._d)) : null);
    if (!dt) return;
    const t = dt.getTime();
    if (t < start || t > end) return;
    const sku = r.SKU;
    if (!(sku in SKU_LB)) return;
    if (!byDate[t]) byDate[t] = { dt, LW: 0, LF: 0, LR: 0, WR: 0 };
    byDate[t][sku] += (r.Cases || 0);
  });

  const tbody = document.getElementById('po-tbody');
  tbody.innerHTML = '';
  const keys = Object.keys(byDate).sort((a, b) => a - b);
  if (!keys.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="color:#888;">No open POs in the next 7 days</td></tr>';
    return;
  }

  const tot = { lb: 0, cs: 0, LW: 0, LF: 0, LR: 0, WR: 0 };
  keys.forEach(k => {
    const d = byDate[k];
    const cases = d.LW + d.LF + d.LR + d.WR;
    const lb = d.LW * SKU_LB.LW + d.LF * SKU_LB.LF + d.LR * SKU_LB.LR + d.WR * SKU_LB.WR;
    tot.lb += lb; tot.cs += cases; tot.LW += d.LW; tot.LF += d.LF; tot.LR += d.LR; tot.WR += d.WR;
    const label = d.dt.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', timeZone: 'UTC' }) +
      ' (' + d.dt.toLocaleDateString('en-US', { weekday: 'short', timeZone: 'UTC' }) + ')';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${label}</td>
      <td class="num">${Math.round(lb).toLocaleString()}</td>
      <td class="num">${cases.toLocaleString()}</td>
      <td class="num">${d.LW || ''}</td>
      <td class="num">${d.LF || ''}</td>
      <td class="num">${d.LR || ''}</td>
      <td class="num">${d.WR || ''}</td>`;
    tbody.appendChild(tr);
  });

  const tr = document.createElement('tr');
  tr.className = 'total-row';
  tr.innerHTML = `
    <td>Total</td>
    <td class="num">${Math.round(tot.lb).toLocaleString()}</td>
    <td class="num">${tot.cs.toLocaleString()}</td>
    <td class="num">${tot.LW || ''}</td>
    <td class="num">${tot.LF || ''}</td>
    <td class="num">${tot.LR || ''}</td>
    <td class="num">${tot.WR || ''}</td>`;
  tbody.appendChild(tr);
}

// ── Corrective Actions detail (refDate) ──
function renderCaSection() {
  const rd = refDate;
  const rows = caRows.filter(r => sameDay(r.ReportedDate, rd));
  const dateStr = rd.toLocaleDateString('en-US', { month: 'long', day: 'numeric', timeZone: 'UTC' });
  document.getElementById('ca-title').textContent = `Corrective Actions — ${dateStr}`;

  const list = document.getElementById('ca-list');
  list.innerHTML = '';
  if (!rows.length) {
    list.innerHTML = '<div class="ca-none">None reported.</div>';
    return;
  }
  rows.forEach(r => {
    let action = r.CorrectiveAction || '';
    if (String(action).toLowerCase() === 'other') action = r.OtherCorrectiveAction || action;
    const site = [r.Farm, r.SiteName].filter(Boolean).join(' · ');
    const div = document.createElement('div');
    div.className = 'ca-item';
    div.innerHTML =
      `<div class="ca-meta">${escapeHtml(r.Log || '')}${site ? ' — ' + escapeHtml(site) : ''}</div>` +
      `<div class="ca-warn">${escapeHtml(r.Warning || '')}</div>` +
      `<div class="ca-act">→ ${escapeHtml(action || '—')}</div>`;
    list.appendChild(div);
  });
}

// ── Sales $ Summary Table ──
function renderSalesTable() {
  const rd = refDate;
  const yr = rd.getUTCFullYear();
  const mo = rd.getUTCMonth() + 1;
  const dy = rd.getUTCDate();
  const md = mo * 100 + dy;

  const tmp = new Date(Date.UTC(yr, mo - 1, dy));
  tmp.setUTCDate(tmp.getUTCDate() + 4 - (tmp.getUTCDay() || 7));
  const ys = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
  const refIsoWeek = Math.ceil(((tmp - ys) / 86400000 + 1) / 7);
  const refDow = rd.getUTCDay();

  const isRefDay = r => r._y === yr && r._m === mo && r._d === dy;
  const isWtd = r => r._y === yr && r._isoWeek === refIsoWeek && r._dow <= refDow;
  const isMtd = r => r._y === yr && r._m === mo && r._d <= dy;
  const isYtd = r => r._y === yr && r._md <= md;
  const isLytd = r => r._y === (yr - 1) && r._md <= md;

  function sumDollars(rows, filterFn) {
    return rows.filter(filterFn).reduce((s, r) => s + r.Dollars, 0);
  }

  const farms = ['Cuke', 'Lettuce'];
  const tbody = document.getElementById('sales-tbody');
  tbody.innerHTML = '';
  const totals = { tdy: 0, wtd: 0, mtd: 0, ytd: 0, lytd: 0 };

  farms.forEach(farm => {
    const fr = invoiceRows.filter(r => r.Farm === farm);
    const tdy = sumDollars(fr, isRefDay);
    const wtd = sumDollars(fr, isWtd);
    const mtd = sumDollars(fr, isMtd);
    const ytd = sumDollars(fr, isYtd);
    const lytd = sumDollars(fr, isLytd);
    const chg = lytd ? ((ytd - lytd) / lytd * 100) : 0;
    totals.tdy += tdy; totals.wtd += wtd; totals.mtd += mtd;
    totals.ytd += ytd; totals.lytd += lytd;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${farm}</td>
      <td class="num">${Math.round(tdy / 1000).toLocaleString()}</td>
      <td class="num">${Math.round(wtd / 1000).toLocaleString()}</td>
      <td class="num">${Math.round(mtd / 1000).toLocaleString()}</td>
      <td class="num">${Math.round(ytd / 1000).toLocaleString()}</td>
      <td class="num">${Math.round(lytd / 1000).toLocaleString()}</td>
      <td class="num">${lytd ? chg.toFixed(1) + '%' : '—'}</td>
    `;
    tbody.appendChild(tr);
  });

  const totChg = totals.lytd ? ((totals.ytd - totals.lytd) / totals.lytd * 100) : 0;
  const totTr = document.createElement('tr');
  totTr.className = 'total-row';
  totTr.innerHTML = `
    <td>Total</td>
    <td class="num">${Math.round(totals.tdy / 1000).toLocaleString()}</td>
    <td class="num">${Math.round(totals.wtd / 1000).toLocaleString()}</td>
    <td class="num">${Math.round(totals.mtd / 1000).toLocaleString()}</td>
    <td class="num">${Math.round(totals.ytd / 1000).toLocaleString()}</td>
    <td class="num">${Math.round(totals.lytd / 1000).toLocaleString()}</td>
    <td class="num">${totals.lytd ? totChg.toFixed(1) + '%' : '—'}</td>
  `;
  tbody.appendChild(totTr);
}

// ── Weekly $ Chart ──
function renderWeeklyChart() {
  const yr = refDate.getUTCFullYear();
  const data = {};
  for (let d = 1; d <= 5; d++) data[d] = {};

  invoiceRows.filter(r => r._y === yr).forEach(r => {
    const dow = r._dow;
    if (dow < 1 || dow > 5) return;
    const w = r._isoWeek;
    if (!data[dow][w]) data[dow][w] = 0;
    data[dow][w] += r.Dollars;
  });

  const weeks = [];
  for (let w = 1; w <= 52; w++) weeks.push(w);

  const dayNames = ['', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
  const dayColors = ['', '#e74c3c', '#4a90d9', '#4ecca3', '#f0a030', '#888'];

  const datasets = [];
  for (let d = 1; d <= 5; d++) {
    datasets.push({
      label: dayNames[d],
      data: weeks.map(w => data[d][w] ? Math.round(data[d][w] / 1000) : null),
      borderColor: dayColors[d],
      backgroundColor: dayColors[d],
      tension: 0.3,
      pointRadius: 2,
      spanGaps: false,
      borderWidth: 2
    });
  }

  if (weeklyChart) weeklyChart.destroy();
  const ctx = document.getElementById('weeklyChart').getContext('2d');
  weeklyChart = new Chart(ctx, {
    type: 'line',
    data: { labels: weeks, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            color: '#555',
            font: { size: 11 },
            usePointStyle: true,
            pointStyle: 'circle',
            generateLabels: chart => {
              const original = Chart.defaults.plugins.legend.labels.generateLabels(chart);
              return original.map(label => {
                if (label.hidden) label.fontColor = 'rgba(85,85,85,0.3)';
                return label;
              });
            }
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y != null ? ctx.parsed.y.toLocaleString() : '—'}`
          }
        }
      },
      scales: {
        x: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.06)' } },
        y: {
          grace: '5%',
          ticks: { color: '#888', font: { size: 11 }, precision: 0 },
          grid: { color: 'rgba(0,0,0,0.06)' }
        }
      }
    }
  });
}

// ── Cuke Pounds Table ──
function renderCukeTable() {
  const rd = refDate;
  const dayRows = cukeGrowRows.filter(r => r._y === rd.getUTCFullYear() && r._m === (rd.getUTCMonth() + 1) && r._d === rd.getUTCDate());

  const ghData = {};
  dayRows.forEach(r => {
    const gh = r.Greenhouse;
    if (!ghData[gh]) ghData[gh] = { K1:0, K2:0, J1:0, J2:0, E1:0, E2:0, days:null };
    const key = r.Variety + r.Grade;
    if (ghData[gh][key] !== undefined) ghData[gh][key] += r.GreenhouseNetWeight;
    // Age of the cycle = days since seeding, expected to be the same across
    // all varieties in a single GH cycle. Take min if different.
    const d = r.DaysSinceSeed;
    if (typeof d === 'number' && !isNaN(d)) {
      if (ghData[gh].days === null || d < ghData[gh].days) ghData[gh].days = d;
    }
  });

  const tbody = document.getElementById('cuke-tbody');
  tbody.innerHTML = '';
  // Sort GHs by days-since-seed (ascending). Null days go to the end.
  const ghNames = Object.keys(ghData).sort((a, b) => {
    const da = ghData[a].days, db = ghData[b].days;
    if (da === null && db === null) return a.localeCompare(b);
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });
  const tots = { K1:0, K2:0, J1:0, J2:0, E1:0, E2:0 };

  ghNames.forEach(gh => {
    const d = ghData[gh];
    const total = d.K1 + d.K2 + d.J1 + d.J2 + d.E1 + d.E2;
    const g1 = d.K1 + d.J1 + d.E1;
    const g2 = d.K2 + d.J2 + d.E2;
    const og = (g1 + g2) ? (g2 / (g1 + g2) * 100) : 0;
    Object.keys(tots).forEach(k => tots[k] += d[k]);

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:#4a8c5c;font-weight:600;">${gh}</td>
      <td class="num">${d.days !== null ? d.days : ''}</td>
      <td class="num">${d.K1 ? Math.round(d.K1).toLocaleString() : ''}</td>
      <td class="num">${d.J1 ? Math.round(d.J1).toLocaleString() : ''}</td>
      <td class="num">${d.E1 ? Math.round(d.E1).toLocaleString() : ''}</td>
      <td class="num">${d.K2 ? Math.round(d.K2).toLocaleString() : ''}</td>
      <td class="num">${d.J2 ? Math.round(d.J2).toLocaleString() : ''}</td>
      <td class="num">${d.E2 ? Math.round(d.E2).toLocaleString() : ''}</td>
      <td class="num">${Math.round(total).toLocaleString()}</td>
      <td class="num">${og.toFixed(1)}%</td>
    `;
    tbody.appendChild(tr);
  });

  const totDay = Object.values(tots).reduce((s, v) => s + v, 0);
  const totG1 = tots.K1 + tots.J1 + tots.E1;
  const totG2 = tots.K2 + tots.J2 + tots.E2;
  const totOg = (totG1 + totG2) ? (totG2 / (totG1 + totG2) * 100) : 0;

  const tr = document.createElement('tr');
  tr.className = 'total-row';
  tr.innerHTML = `
    <td style="font-weight:600;">Total</td>
    <td class="num"></td>
    <td class="num">${Math.round(tots.K1).toLocaleString()}</td>
    <td class="num">${Math.round(tots.J1).toLocaleString()}</td>
    <td class="num">${Math.round(tots.E1).toLocaleString()}</td>
    <td class="num">${Math.round(tots.K2).toLocaleString()}</td>
    <td class="num">${Math.round(tots.J2).toLocaleString()}</td>
    <td class="num">${Math.round(tots.E2).toLocaleString()}</td>
    <td class="num">${Math.round(totDay).toLocaleString()}</td>
    <td class="num">${totOg.toFixed(1)}%</td>
  `;
  tbody.appendChild(tr);
}

// ── Lettuce Pounds Table ──
function renderLettuceTable() {
  const rd = refDate;
  const dayRows = lettuceGrowRows.filter(r => r._y === rd.getUTCFullYear() && r._m === (rd.getUTCMonth() + 1) && r._d === rd.getUTCDate());
  // Order by pond (P1 → P7), natural numeric sort.
  dayRows.sort((a, b) => String(a.Pond).localeCompare(String(b.Pond), undefined, { numeric: true, sensitivity: 'base' }));

  const tbody = document.getElementById('lettuce-tbody');
  tbody.innerHTML = '';
  let totBoards = 0, totLbs = 0;

  dayRows.forEach(r => {
    const boards = Math.round(r.BoardsPerPond) || 0;
    const lbBoard = r.PoundsPerBoard || 0;
    const total = r.GreenhouseNetWeight || 0;
    totBoards += boards;
    totLbs += total;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:#4a8c5c;font-weight:600;">${r.Pond}</td>
      <td>${r.SeedName}</td>
      <td class="num">${boards.toLocaleString()}</td>
      <td class="num">${lbBoard ? lbBoard.toFixed(1) : ''}</td>
      <td class="num">${Math.round(total).toLocaleString()}</td>
    `;
    tbody.appendChild(tr);
  });

  const avgLbBoard = totBoards ? totLbs / totBoards : 0;
  const tr = document.createElement('tr');
  tr.className = 'total-row';
  tr.innerHTML = `
    <td style="font-weight:600;">Total</td>
    <td></td>
    <td class="num">${totBoards.toLocaleString()}</td>
    <td class="num">${avgLbBoard ? avgLbBoard.toFixed(1) : ''}</td>
    <td class="num">${Math.round(totLbs).toLocaleString()}</td>
  `;
  tbody.appendChild(tr);
}

// ── Load Data ──
async function loadData() {
  // Fetch every source concurrently — total time is the slowest single fetch
  // rather than the sum of all six. The optional FS/PO sources swallow their
  // own errors (return null) so one bad source can't blank the page.
  const swallow = (p, name) => p.catch(e => { console.error(name + ' load error:', e); return null; });
  const [invoiceTable, cukeTable, lettTable, empTable, caTable, poTable,
         ruleTable, cukePreopTable, lettPreopTable] = await Promise.all([
    DataSource.fetchTable('invoices_daily'),
    DataSource.fetchTable('cuke_harvest_daily'),
    DataSource.fetchTable('lettuce_harvest'),
    swallow(DataSource.fetchTable('fsafe_emp'), 'fsafe_emp'),
    swallow(DataSource.fetchTable('fsafe_ca'), 'fsafe_ca'),
    swallow(DataSource.fetchTable('lettuce_pack_orders'), 'lettuce_pack_orders'),
    swallow(DataSource.fetchTable('data_check_rule', { mode: 'prod' }), 'data_check_rule'),
    swallow(DataSource.fetchTable('fsafe_cuke_preop'), 'fsafe_cuke_preop'),
    swallow(DataSource.fetchTable('fsafe_lettuce_preop'), 'fsafe_lettuce_preop'),
  ]);

  // invoices_daily is pre-aggregated to date×farm dollar totals in sheets mode
  // (no ProductCode/CustomerGroup columns); in supabase mode it returns raw
  // rows with those columns. Filter only when the columns are present, and key
  // the year off the parsed date (_y) which both shapes have.
  invoiceRows = parseGvizTable(invoiceTable)
    .filter(r => (r.CustomerGroup === undefined || r.CustomerGroup) &&
                 (r.ProductCode === undefined || r.ProductCode !== 'Sales'))
    .filter(r => r._y === 2025 || r._y === 2026);
  invoiceRows.forEach(r => { r.Dollars = r.Dollars || 0; });

  cukeGrowRows = parseGvizTable(cukeTable).filter(r => r._y === 2026);
  cukeGrowRows.forEach(r => {
    r.Greenhouse = r.Greenhouse || '';
    r.Variety = r.Variety || '';
    r.Grade = Math.round(r.Grade || 0);
    r.GreenhouseNetWeight = r.GreenhouseNetWeight || 0;
  });

  lettuceGrowRows = parseGvizTable(lettTable).filter(r => r._y === 2026);
  lettuceGrowRows.forEach(r => {
    r.Pond = r.Pond || '';
    r.SeedName = r.SeedName || '';
    r.BoardsPerPond = r.BoardsPerPond || 0;
    r.PoundsPerBoard = r.PoundsPerBoard || 0;
    r.GreenhouseNetWeight = r.GreenhouseNetWeight || 0;
  });

  // Food safety + POs (default to sheets via per-source config)
  empRows = empTable ? parseGvizTable(empTable) : [];
  caRows  = caTable  ? parseGvizTable(caTable)  : [];
  poRows  = poTable  ? parseGvizTable(poTable)  : [];
  poRows.forEach(r => { r.SKU = r.SKU || ''; r.Cases = +r.Cases || 0; });

  // Data-quality rules (prod) + pre-op checklists (sheets)
  checkRules = ruleTable
    ? parseGvizTable(ruleTable).filter(r => r.is_active !== false && String(r.is_active).toLowerCase() !== 'false')
    : [];
  preopData['fsafe_cuke_preop']    = cukePreopTable ? parseGvizTable(cukePreopTable) : [];
  preopData['fsafe_lettuce_preop'] = lettPreopTable ? parseGvizTable(lettPreopTable) : [];

  setDay('today');
}

// Per-source settings panel behind the header gear
if (window.DataSource && DataSource.renderSourcePanel) DataSource.renderSourcePanel('srcGear');

loadData().catch(err => console.error('Load error:', err));
</script>
